<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bakester Bakery — Handcrafted Heritage in Every Bite. Artisan cakes, brownies, and pastries baked fresh daily." />
    <meta name="keywords" content="bakery, cakes, artisan, brownies, pastries, custom cakes, wedding cakes" />

    <!-- Preconnect to external origins before any render blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preconnect to Unsplash CDN so hero images load faster -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <!-- Preconnect to Supabase API for faster product fetch -->
    <link rel="dns-prefetch" href="https://supabase.co" />

    <!-- Load only the weights we actually use — saves ~30KB on mobile -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Preload first hero image so it shows without LCP delay -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=700&h=500&fit=crop&auto=format&q=70"
    />

    <title>Bakester Bakery — Handcrafted Heritage in Every Bite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
